<div class="auth-page-wrapper">
  <a routerLink="/home" class="auth-back-home" aria-label="Ir para a página inicial FilmAholic">
    <span class="auth-back-home__arrow" aria-hidden="true">←</span>
    <span class="auth-back-home__brand">FilmAholic</span>
    <span>Início</span>
  </a>
  <div class="auth-card">
    <h1>Nova Password</h1>
    <p>Escolha a sua nova password para <b>{{ model.email }}</b></p>

    <form (ngSubmit)="onResetPassword()">
      <div *ngIf="errorMessage" style="background-color:#3b1319;border:1px solid #ff4d6a;border-radius:8px;padding:12px 16px;margin-bottom:16px;color:#ffd5dd;font-size:14px;">
        {{ errorMessage }}
      </div>
      <div *ngIf="successMessage" style="background-color:#133b24;border:1px solid #28a745;border-radius:8px;padding:12px 16px;margin-bottom:16px;color:#c9f7d0;font-size:14px;">
        {{ successMessage }}
      </div>
      <input type="password" name="newPass" [(ngModel)]="model.newPassword" placeholder="Nova Password" required>
      <input type="password" name="confirmPass" [(ngModel)]="confirmarPassword" placeholder="Confirmar Password" required>

      <button type="submit" class="btn-primary-global" [disabled]="isLoading">
        {{ isLoading ? 'A guardar...' : 'Redefinir Password' }}
      </button>

      <div class="footer-links">
        <a routerLink="/home">Página inicial</a>
        <a routerLink="/login">Voltar ao Log In</a>
      </div>
    </form>
  </div>
</div>
