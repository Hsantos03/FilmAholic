<div class="auth-page-wrapper">
  <div class="auth-card">
    <h1>Nova Password</h1>
    <p>Escolha a sua nova password para <b>{{ model.email }}</b></p>

    <form (ngSubmit)="onResetPassword()">
      <div *ngIf="errorMessage" class="reset-alert reset-alert--error" role="alert">
        {{ errorMessage }}
      </div>
      <div *ngIf="successMessage" class="reset-alert reset-alert--success" role="status">
        {{ successMessage }}
      </div>

      <p class="auth-required-hint"><span class="auth-required-mark">*</span> Campos obrigatórios.</p>
      <label class="auth-field-label" for="reset-new-password">Nova password<span class="auth-required-mark" aria-hidden="true">*</span></label>
      <input id="reset-new-password" type="password" name="newPass" [(ngModel)]="model.newPassword" placeholder="Nova password" required autocomplete="new-password" aria-required="true">
      <label class="auth-field-label" for="reset-confirm-password">Confirmar password<span class="auth-required-mark" aria-hidden="true">*</span></label>
      <input id="reset-confirm-password" type="password" name="confirmPass" [(ngModel)]="confirmarPassword" placeholder="Confirmar password" required autocomplete="new-password" aria-required="true">

      <button type="submit" class="btn-primary-global" [disabled]="isLoading || !!successMessage">
        {{ isLoading ? 'A guardar...' : 'Redefinir Password' }}
      </button>

      <div class="footer-links">
        <a routerLink="/home">Página inicial</a>
        <a routerLink="/login">Voltar ao Log In</a>
      </div>
    </form>
  </div>
</div>
