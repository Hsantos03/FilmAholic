<div class="auth-page-wrapper">
  <div class="auth-card">
    <h1>Nova Password</h1>
    <p>Escolha a sua nova password para <b>{{ model.email }}</b></p>

    <form (ngSubmit)="onResetPassword()">
      <div *ngIf="errorMessage" class="reset-alert reset-alert--error" role="alert">
        {{ errorMessage }}
      </div>
      <div *ngIf="successMessage" class="reset-alert reset-alert--success" role="status">
        {{ successMessage }}
      </div>
      <input type="password" name="newPass" [(ngModel)]="model.newPassword" placeholder="Nova Password" required>
      <input type="password" name="confirmPass" [(ngModel)]="confirmarPassword" placeholder="Confirmar Password" required>

      <button type="submit" class="btn-primary-global" [disabled]="isLoading || !!successMessage">
        {{ isLoading ? 'A guardar...' : 'Redefinir Password' }}
      </button>

      <div class="footer-links">
        <a routerLink="/home">Página inicial</a>
        <a routerLink="/login">Voltar ao Log In</a>
      </div>
    </form>
  </div>
</div>
