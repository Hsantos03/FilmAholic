<div class="actors-carousel-container" *ngIf="actors && actors.length > 0">
  <div class="carousel">
    <button class="chevron left" (click)="prev()" aria-label="Previous">
      &lsaquo;
    </button>

    <div class="carousel-track">
      <div class="actor-card" *ngFor="let actor of visibleActors; let i = index">
        <div class="actor-number-badge">{{ getActorRanking(actor) }}</div>
        <img class="actor-photo" [src]="fotoAtor(actor)" [alt]="actor.nome" />
        <div class="actor-name">{{ actor.nome }}</div>
      </div>
    </div>

    <button class="chevron right" (click)="next()" aria-label="Next">
      &rsaquo;
    </button>
  </div>
</div>
