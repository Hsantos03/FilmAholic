<div class="auth-page-wrapper">
  <div class="auth-card">
    <div class="header">
      <h1>Recuperar Password</h1>
      <p>Introduza o seu email para receber o link de recuperação.</p>
    </div>

    <form (ngSubmit)="onSendEmail()">
      <div *ngIf="errorMessage" class="auth-alert auth-alert--error" role="alert">
        {{ errorMessage }}
      </div>
      <div *ngIf="successMessage" class="auth-alert auth-alert--success" role="status" aria-live="polite">
        {{ successMessage }}
      </div>
      <input type="email" name="email" [(ngModel)]="email" placeholder="Email de registo" required [disabled]="!!successMessage">

      <button type="submit" class="btn-primary-global" [disabled]="isLoading || !!successMessage">
        {{ isLoading ? 'A enviar...' : 'Enviar Link de Recuperação' }}
      </button>

      <div class="footer-links">
        <a routerLink="/home">Página inicial</a>
        <a routerLink="/login">Voltar ao Log In</a>
      </div>
    </form>
  </div>
</div>
